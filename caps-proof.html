<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nine capabilities · proof sheet</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&display=swap" rel="stylesheet" />
<style>
  :root { --font-sans: "Bricolage Grotesque", sans-serif; }
  body { background: #F7F4EF; margin: 0; font-family: var(--font-sans); }
  .sheet { max-width: 1100px; margin: 0 auto; padding: 30px 20px 80px; }
  h1 { font-size: 22px; color: #172A2D; }
  .proof { margin: 26px 0; }
  .proof h2 { font-size: 14px; color: #172A2D; margin: 0 0 8px; }
  .proof .rec-viz { background: #FFFFFF; border-radius: 20px; padding: 18px; box-shadow: 0 10px 30px rgba(23,42,45,0.08); }
  .proof svg { display: block; width: 100%; height: auto; }
  /* neutralize entrance animations so everything is fully visible for proofing */
  .cap-layer, .cap-flow { animation: none !important; opacity: initial; }
</style>
</head>
<body>
<div class="sheet">
  <h1>Nine capabilities · proof sheet (dev only)</h1>
  <div id="out"></div>
</div>
<div style="display:none"><div id="rec-rail"></div><div id="rec-body"></div></div>
<script>
window.NEBOR_RE_CAPS = [
  { id: "strategy", title: "01 · Demand Strategy & Channel Mapping" },
  { id: "workflows", title: "02 · AI-Powered Demand Workflows & Plays" },
  { id: "paid", title: "03 · Audience Building & Paid Media Strategy" },
  { id: "listen", title: "04 · Social Listening & Competitive Tracking" },
  { id: "capture", title: "05 · Inbound Capture & Dynamic Landing Pages" },
  { id: "abm", title: "06 · Account-Based Marketing & ABM Programs" },
  { id: "nurture", title: "07 · Nurture & Lifecycle Journeys" },
  { id: "sequences", title: "08 · Inbound-Led Outbound Sequences" },
  { id: "attrib", title: "09 · Pipeline & Attribution Reporting" }
];
</script>
<script src="scripts/tools.js?v=3"></script>
<script src="scripts/re-console-demand.js?v=43"></script>
<script>
  const out = document.getElementById('out');
  window.NEBOR_RE_CAPS.forEach(c => {
    const d = document.createElement('div');
    d.className = 'proof'; d.id = 'p-' + c.id;
    d.innerHTML = '<h2>' + c.title + '</h2>' + (window.NEBOR_RE_VIEWS[c.id] || (() => 'MISSING'))();
    out.appendChild(d);
  });
</script>
</body>
</html>
