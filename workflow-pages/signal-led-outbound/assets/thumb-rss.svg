<svg class="intro-rss" viewBox="100 80 280 326" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="rssFace" x1="0.15" y1="0" x2="0.85" y2="1">
            <stop offset="0"    stop-color="#FFC766"/>
            <stop offset="0.5"  stop-color="#F6A21E"/>
            <stop offset="1"    stop-color="#E2870C"/>
          </linearGradient>
          <linearGradient id="rssSide" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#CC7A0A"/>
            <stop offset="1" stop-color="#A8620A"/>
          </linearGradient>
          <radialGradient id="rssGloss" cx="0.32" cy="0.16" r="0.78">
            <stop offset="0"   stop-color="#FFFFFF" stop-opacity="0.6"/>
            <stop offset="0.42" stop-color="#FFFFFF" stop-opacity="0.08"/>
            <stop offset="1"   stop-color="#FFFFFF" stop-opacity="0"/>
          </radialGradient>
          <linearGradient id="rssWave" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0" stop-color="#FFFFFF"/>
            <stop offset="1" stop-color="#FFE9CC"/>
          </linearGradient>
          <filter id="rssShadow" x="-60%" y="-60%" width="220%" height="220%">
            <feGaussianBlur in="SourceGraphic" stdDeviation="13"/>
          </filter>
        </defs>
        <!-- soft contact shadow -->
        <ellipse cx="244" cy="346" rx="118" ry="24" fill="#3A2A10" opacity="0.30" filter="url(#rssShadow)"/>
        <!-- extruded depth (bottom edge) -->
        <rect x="120" y="118" width="240" height="240" rx="62" fill="url(#rssSide)"/>
        <!-- top face -->
        <rect x="120" y="100" width="240" height="240" rx="62" fill="url(#rssFace)"/>
        <!-- glossy top-left light -->
        <rect x="120" y="100" width="240" height="240" rx="62" fill="url(#rssGloss)"/>
        <!-- RSS broadcast mark (dot + two arcs), bottom-left anchored -->
        <g>
          <path d="M182 174 A92 92 0 0 1 274 266" fill="none" stroke="url(#rssWave)" stroke-width="26" stroke-linecap="round"/>
          <path d="M182 216 A50 50 0 0 1 232 266" fill="none" stroke="url(#rssWave)" stroke-width="26" stroke-linecap="round"/>
          <circle cx="186" cy="262" r="21" fill="url(#rssWave)"/>
          <circle cx="186" cy="262" r="21" fill="#E2870C" opacity="0.12"/>
        </g>
      </svg>