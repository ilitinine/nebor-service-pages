<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>CRM caps proof</title>
<style>
  :root { --font-sans: -apple-system, "Inter", sans-serif; }
  body { margin: 0; padding: 24px; background: #FFFFFF; font-family: var(--font-sans); }
  .proof { width: 700px; margin-bottom: 30px; }
  h2 { margin: 0 0 8px; font-size: 18px; }
  .cv { background: #EFEAE3; border-radius: 24px; padding: 18px; }
  .rec-viz svg { width: 100%; display: block; }
</style></head><body>
<div id="out"></div>
<div style="display:none"><div id="rec-rail"></div><div id="rec-body"></div></div>
<script>
window.NEBOR_RE_CAPS = [
  { id: "implement", tag: "architect", title: "CRM Implementation & Configuration" },
  { id: "migrate", tag: "architect", title: "Migration & Consolidation" },
  { id: "optimize", tag: "architect", title: "CRM Optimization & Performance Tuning" },
  { id: "hygiene", tag: "unify", title: "Data Hygiene & Cleanup" },
  { id: "enrich", tag: "unify", title: "Dynamic Enrichment & Live Data" },
  { id: "integrate", tag: "unify", title: "Integration & Data Flow" },
  { id: "automation", tag: "activate", anchor: true, title: "Workflow Automation" },
  { id: "routing", tag: "activate", title: "Lead Scoring & Routing" },
  { id: "reporting", tag: "activate", title: "Attribution & Pipeline Reporting" }
];
</script>
<script src="scripts/re-console-crm.js?v=9"></script>
<script>
const out = document.getElementById("out");
window.NEBOR_RE_CAPS.forEach(c => {
  const s = document.createElement("section");
  s.className = "proof";
  s.id = "p-" + c.id;
  s.innerHTML = "<h2>" + c.title + "</h2><div class='cv'>" + window.NEBOR_CRM_VIEWS[c.id]() + "</div>";
  out.appendChild(s);
});
</script>
</body></html>
